<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TopTurismo</title>
    <link rel="stylesheet" href="css/login-cadastro.css">
    <link rel="shortcut icon" href="imagens/logo-favicon.ico" type="image/x-icon">
</head>
<body>
    <main class="container-principal">
        <section class="secao-login">
            <div class="conteudo-central">
                <header class="logotipo">
                    <a href="login.html">
                        <img src="imagens/logo-favicon.ico" alt="Logo">
                        <span>TopTurismo</span>
                    </a>
                </header>

                <h1 class="titulo-principal">Olá!</h1>
                <p class="subtitulo">Acesse sua conta para continuar.</p>

                <form>
                    <div class="campo-entrada">
                        <label>E-mail</label>
                        <input type="email" placeholder="Digite seu e-mail" required>
                    </div>
                    
                    <div class="campo-entrada">
                        <label>Senha</label>
                        <input type="password" placeholder="Digite sua senha" required>
                    </div>

                    <button type="submit" class="botao-continuar">Entrar</button>
                </form>

                <div class="extra">
                    Novo por aqui? <a href="cadastro.html">Cadastre-se</a>
                </div>
            </div>
        </section>
        
        <section class="secao-hero-imagem">
            <a href="index.html" class="botao-fechar-tela" title="Sair">✕</a>
        </section>
    </main>
</body>
</html>
